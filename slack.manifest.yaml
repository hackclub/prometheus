_metadata:
  major_version: 1

display_information:
  name: Prometheus
  long_description: Prometheus is a slack bot that allows community members to manage their own channels. You must be approved by the Fire Department (aka the admins) to use it, but once you are, you can keep your channels clean and even timeout unruly members (or just remove them from the channel, but that sounds less cool). Get started by running `/pro`.
  description: Channel moderation for the people
  background_color: "#d03e28"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: Prometheus
    always_online: true
  shortcuts:
    - name: Destroy Thread
      type: message
      callback_id: destroy_thread
      description: Delete an entire thread.
    - name: Delete Message
      type: message
      callback_id: delete_message
      description: Delete a single message.
    - name: Clear Embeds
      type: message
      callback_id: clear_embeds
      description: Remove link previews from a message.
    - name: Manage Embeds
      type: message
      callback_id: manage_embeds
      description: Manage link previews in a message.
  slash_commands:
    - command: /pro
      description: Use Prometheus
      usage_hint: "help"
      should_escape: true

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:join
      - channels:read
      - channels:write.invites
      - chat:write
      - chat:write.customize
      - commands
      - groups:history
      - groups:read
      - im:read
      - im:write
      - mpim:read
      - mpim:write
      - pins:write
    user:
      - channels:history
      - channels:write
      - chat:write
      - im:write
      - groups:history
      - groups:write
      - users.profile:read
      - users.profile:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - member_joined_channel
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
